    <script> var app = angular.module('myApp', []); app.controller('myCtrl', function($scope, $http) {
    
    $http.get('https://smsk.nascorptechnologies.com/gw/gls/getStuGalleryList?token=pb5bep8HtzBlg2grQb').then(function (resp){

                })
    
    
        }); 
    
    
    </script>
        
    <script>
    
            // Function to open the modal
    function openLightboxModal(index) {
      var modal = document.getElementById('lightboxModal');
      var modalImg = document.getElementById('lightboxImage');
      var captionText = document.getElementById('caption');
      var galleryImage = document.querySelectorAll('.gallery-image')[index];
    
      modal.style.display = "block";
      modalImg.src = galleryImage.src;
      captionText.innerHTML = galleryImage.alt;
    
      // Event listener to close the modal
      var span = document.getElementsByClassName("close-modal")[0];
      span.onclick = function() {
        modal.style.display = "none";
      }
    }
    
    // Function to close the modal
    function closeModal() {
      var modal = document.getElementById('lightboxModal');
      modal.style.display = "none";
    }
    
    </script>

<body ng-app='myApp' ng-controller='myCtrl'>
    <div class="container-xxxl bg-white p-0">
        <!-- Spinner Start -->
        <div id="spinner"
            class="show bg-white position-fixed translate-middle w-100 vh-100 top-50 start-50 d-flex align-items-center justify-content-center">
            <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status">

        </div>00000000000000

<!-- Navbar End -->
