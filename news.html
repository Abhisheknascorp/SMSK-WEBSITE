<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="utf-8">
   <title>SMSK - News Feed</title>
   <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link href="img/favicon.png" rel="icon">
   <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600&family=Inter:wght@600&family=Lobster+Two:wght@700&display=swap" rel="stylesheet">
   <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
   <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css" rel="stylesheet">
   <link href="lib/animate/animate.min.css" rel="stylesheet">
   <link href="lib/owlcarousel/assets/owl.carousel.min.css" rel="stylesheet">
   <link href="css/bootstrap.min.css" rel="stylesheet">
   <link href="css/style.css" rel="stylesheet">
   <style>
      .news-card {
         transition: transform 0.3s ease, box-shadow 0.3s ease;
      }
      .news-card:hover {
         transform: translateY(-5px);
         box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
      }

      .card-img-top {
         height: 220px;
         object-fit: cover;
         object-position: center;
         border-top-left-radius: 0.5rem;
         border-top-right-radius: 0.5rem;
         background-color: #f0f0f0;
      }

      .card-title {
         font-weight: 600;
         font-size: 1.2rem;
      }

      .card-text {
         font-size: 0.95rem;
         color: #444;
      }

      .modal {
         display: none;
         position: fixed;
         z-index: 9999;
         left: 0;
         top: 0;
         width: 100%;
         height: 100%;
         background-color: rgba(0,0,0,0.6);
         overflow-y: auto;
      }

      .modal-content {
         background: #fff;
         padding: 30px;
         max-width: 700px;
         margin: 5% auto;
         border-radius: 10px;
         position: relative;
         box-shadow: 0 8px 20px rgba(0,0,0,0.3);
         animation: slideDown 0.3s ease;
      }

      @keyframes slideDown {
         from {
            transform: translateY(-20px);
            opacity: 0;
         }
         to {
            transform: translateY(0);
            opacity: 1;
         }
      }

      .modal img {
         max-height: 300px;
         object-fit: cover;
         object-position: center;
         width: 100%;
         border-radius: 8px;
         margin-bottom: 20px;
      }

      @media (max-width: 576px) {
         .card-img-top {
            height: 180px;
         }
         .card-title {
            font-size: 1.05rem;
         }
      }
   </style>
</head>
<body>
   <div id="navbar-container"></div>

   <!-- Page Header Start -->
   <div class="container-xxl py-5 page-header position-relative mb-5">
      <div class="container py-5">
         <h1 class="display-2 text-white animated slideInDown mb-4">News Feed</h1>
      </div>
   </div>

   <!-- News Feed -->
   <div style="padding: 3rem 0; text-align: center;">
      <div class="container">
         <h2 >Latest News</h2>
         <div id="newsContainer" class="row justify-content-center mt-4"></div>
      </div>
   </div>

   <!-- Modal -->
   <div id="myModal" class="modal">
      <div class="modal-content">
         <!-- Dynamic content injected here -->
      </div>
   </div>

   <div id="footer-container"></div>
   <a href="#" class="btn btn-lg btn-primary btn-lg-square back-to-top ytb"><i class="bi bi-arrow-up"></i></a>

   <!-- JS Libraries -->
   <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
   <script src="lib/wow/wow.min.js"></script>
   <script src="lib/easing/easing.min.js"></script>
   <script src="lib/waypoints/waypoints.min.js"></script>
   <script src="lib/owlcarousel/owl.carousel.min.js"></script>

   <!-- News Feed Script -->
   <script>
      document.addEventListener('DOMContentLoaded', function () {
         const newsContainer = document.getElementById('newsContainer');
         const url = 'https://smsk.nascorptechnologies.com/gw/gls/getNewsFeeds?token=mb8unGwZ2ExKLtrBLY';

         fetch(url)
            .then(response => response.json())
            .then(data => {
               if (Array.isArray(data) && data.length > 0) {
                    data.forEach(item => {
                     const title = item.title || "Untitled News";
                     const image = item.img?.servingUrl || 'img/news-placeholder.jpg';
                     const id = item.id;

                     const card = `
                        <div class="col-md-6 col-lg-4 mb-4">
                           <div class="card news-card shadow-sm h-100">
                              <img src="${image}" class="card-img-top" alt="News Image" onerror="this.src='img/news-placeholder.jpg'">
                              <div class="card-body d-flex flex-column">
                                 <h5 class="card-title">${title}</h5>
                                 <a href="news-detail.html?newsId=${id}" class="btn btn-outline-success mt-auto">Read More</a>
                              </div>
                           </div>
                        </div>
                     `;
                     newsContainer.insertAdjacentHTML('beforeend', card);
                  });
               } else {
                  newsContainer.innerHTML = `<p class="text-muted">No news available at the moment.</p>`;
               }
            })
            .catch(error => {
               console.error('Error fetching news:', error);
               newsContainer.innerHTML = `<p class="text-danger">Error fetching news. Please try again later.</p>`;
            });
      });

      function showNewsDetail(data) {
         const modalContent = `
            <div style="text-align:center;">
               <h3 class="mb-3">${data.title || 'Untitled News'}</h3>
               <img src="${data.img?.servingUrl || 'img/news-placeholder.jpg'}" onerror="this.src='img/news-placeholder.jpg'">
               <p style="text-align: justify;">${data.detail || data.description}</p>
               <button onclick="closeModal()" class="btn btn-success mt-4">Close</button>
            </div>
         `;
         document.getElementById('myModal').style.display = 'block';
         document.querySelector('#myModal .modal-content').innerHTML = modalContent;
      }

      function closeModal() {
         document.getElementById('myModal').style.display = 'none';
      }

      // Optional: close modal on outside click
      window.onclick = function(event) {
         const modal = document.getElementById('myModal');
         if (event.target == modal) {
            closeModal();
         }
      };
   </script>

   <script src="js/loader.js"></script>
   <script src="js/footer.js"></script>
</body>
</html>
