<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>SMSK - News Detail</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link href="img/favicon.png" rel="icon">
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600&family=Inter:wght@600&family=Lobster+Two:wght@700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="lib/animate/animate.min.css" rel="stylesheet">
    <link href="lib/owlcarousel/assets/owl.carousel.min.css" rel="stylesheet">
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <style>
        /* =====================================================================
           News Detail Page Specific Styles
           ===================================================================== */
        :root {
            --primary-color: #103741;
            --text-color: #333;
            --light-text: #666;
            --background-color: #f8f9fa;
        }

        body {
            background-color: var(--background-color);
            color: var(--text-color);
        }

        .news-detail-section {
            padding: 4rem 0;
        }

        .news-detail-container {
            background: #fff;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }
        
        .news-title {
            color: var(--primary-color);
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        
        .news-image-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            overflow: hidden;
            border-radius: 0.75rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            background-color: #e9ecef;
        }
        
        .news-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }
        
        .news-detail-content p {
            font-size: 1.15rem;
            line-height: 1.8;
            color: var(--light-text);
            white-space: pre-wrap;
        }
        
        .news-detail-content {
            padding: 0 2rem;
        }
        
        .status-message {
            text-align: center;
            padding: 3rem;
            font-size: 1.2rem;
            color: var(--light-text);
        }
        
        .btn-back-to-news {
            display: inline-block;
            margin-top: 2rem;
            font-size: 1rem;
            text-decoration: none;
            color: #fff;
            background-color: var(--primary-color);
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            transition: background-color 0.3s ease;
        }
        
        .btn-back-to-news:hover {
            background-color: #1B1394;
            color:white;
        }
        
        @media (max-width: 768px) {
            .news-detail-container {
                padding: 1.5rem;
            }
            .news-detail-content {
                padding: 0;
            }
        }
    </style>
</head>

<body>
    <div id="navbar-container"></div>

    <div class="container-xxl py-5 page-header position-relative mb-5">
        <div class="container py-5">
            <h1 class="display-2 text-white animated slideInDown mb-4">News Detail</h1>
        </div>
    </div>
    <div class="container-xxl news-detail-section">
        <div class="container">
            <div id="newsDetailContainer">
                <div class="status-message">Loading news...</div>
            </div>
        </div>
    </div>
    <div id="footer-container"></div>
    <a href="#" class="btn btn-lg btn-primary btn-lg-square back-to-top ytb"><i class="bi bi-arrow-up"></i></a>

    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="lib/wow/wow.min.js"></script>
    <script src="lib/easing/easing.min.js"></script>
    <script src="lib/waypoints/waypoints.min.js"></script>
    <script src="lib/owlcarousel/owl.carousel.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const newsDetailContainer = document.getElementById('newsDetailContainer');
            const params = new URLSearchParams(window.location.search);
            const newsId = params.get('newsId');
            const placeholderImageUrl = 'https://smsk.nascorptechnologies.com/img/news-placeholder.jpg';

            if (!newsId) {
                newsDetailContainer.innerHTML = `
                    <div class="status-message">
                        <h3>News Not Found</h3>
                        <p>No news ID was provided in the URL.</p>
                        <a href="news.html" class="btn-back-to-news">Back to News Feed</a>
                    </div>
                `;
                return;
            }

            fetch('https://smsk.nascorptechnologies.com/gw/gls/getNewsFeeds?token=mb8unGwZ2ExKLtrBLY')
                .then(res => res.json())
                .then(data => {
                    const selectedNews = data.find(item => String(item.id) === String(newsId));

                    if (selectedNews) {
                        const title = selectedNews.title || "Untitled News";
                        const image = selectedNews.img?.servingUrl || placeholderImageUrl;
                        const detailText = selectedNews.detail || selectedNews.description || "No details available.";

                        newsDetailContainer.innerHTML = `
                            <div class="news-detail-container wow fadeIn" data-wow-delay=".3s">
                                <h2 class="news-title">${title}</h2>
                                <div class="news-image-wrapper">
                                    <img class="news-image" src="${image}" alt="${title}" onerror="this.src='${placeholderImageUrl}'">
                                </div>
                                <div class="news-detail-content">
                                    <p>${detailText}</p>
                                </div>
                                <div class="text-center">
                                    <a href="news.html" class="btn-back-to-news">Back to News Feed</a>
                                </div>
                            </div>
                        `;
                        new WOW().init();
                    } else {
                        newsDetailContainer.innerHTML = `
                            <div class="status-message">
                                <h3>News Not Found</h3>
                                <p>We couldn't find the news with the provided ID.</p>
                                <a href="news.html" class="btn-back-to-news">Back to News Feed</a>
                            </div>
                        `;
                    }
                })
                .catch(error => {
                    console.error(error);
                    newsDetailContainer.innerHTML = `
                        <div class="status-message">
                            <h3>Error</h3>
                            <p>Something went wrong while loading the news. Please try again later.</p>
                            <a href="news.html" class="btn-back-to-news">Back to News Feed</a>
                        </div>
                    `;
                });
        });
    </script>
    <script src="js/loader.js"></script>
    <script src="js/footer.js"></script>
</body>

</html>
