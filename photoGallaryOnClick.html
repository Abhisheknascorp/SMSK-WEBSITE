<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>SMSK - Photo Gallery</title>

    <meta content="" name="keywords">
    <meta content="" name="description">

    <!-- Favicon -->
    <link href="img/favicon.png" rel="icon">

    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600&family=Inter:wght@600&family=Lobster+Two:wght@700&display=swap"
        rel="stylesheet">

    <!-- Icon Font Stylesheet -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Libraries Stylesheet -->

    <link href="lib/owlcarousel/assets/owl.carousel.min.css" rel="stylesheet">

    <!-- Customized Bootstrap Stylesheet -->
    <link href="css/bootstrap.min.css" rel="stylesheet">

    <!-- Template Stylesheet -->
    <link href="css/style.css" rel="stylesheet">

    <script src= 'https://ajax.googleapis.com/ajax/libs/angularjs/1.3.14/angular.min.js'></script> 
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const galleryId = urlParams.get('galleryId');
    </script>
	<script> var app = angular.module('myApp', []); app.controller('myCtrl', function($scope, $http) {
	
	$http.get('https://smsk.nascorptechnologies.com/gw/gls/getGalleryImagesOnClick?token=mnzcUiXX9dl70VRPVd&galleryId='+galleryId).then(function (resp){
		$scope.data = resp.data; 
        }, function (err){ ('error '+JSON.stringify(err));
        		})


		}); 
 

	</script>
    <script>
        angular.module('galleryApp', []).controller('GalleryController', ['$scope', function($scope) {
    $scope.data = [
        {url: 'path/to/image1.jpg', description: 'Image 1 Description'},
        {url: 'path/to/image2.jpg', description: 'Image 2 Description'},
        // add more images as needed
    ];

    // LightGallery initialization code goes here, if applicable
}]);

    </script>
    

</head>

<body ng-app='myApp' ng-controller='myCtrl'>
    <div class="container-xxxl bg-white p-0">
        <!-- Spinner Start -->
        <div id="spinner"
            class="show bg-white position-fixed translate-middle w-100 vh-100 top-50 start-50 d-flex align-items-center justify-content-center">
            <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status">
                <span class="sr-only">Loading...</span>
            </div>
        </div>
        <!-- Spinner End -->

        <!-- Header Start -->
        
        <div id="navbar-container"></div>
<!-- Navbar End -->

        <!-- Page Header End -->
        <div class="container-xxl py-5 page-header position-relative mb-5">
            <div class="container py-5">
                <h1 class="display-2 text-white animated slideInDown mb-4">Photo Gallery</h1>
            </div>
        </div>
        <!-- Page Header End -->

        <!-- Gallery -->
       <div class="container-fluid gallery-section py-5 mb-5">
    <div class="container">
        <div class="row g-4 gallery-grid-inner"> 
            <div class="col-md-6 col-lg-4 wow fadeIn" data-wow-delay=".3s" ng-repeat="myObj in data | orderBy: 'id': true">
                <a href="{{myObj.url}}" target="_blank" class="gallery-item-link">
                    <div class="gallery-item">
                        <img ng-src="{{myObj.url}}" alt="{{myObj.alt || 'Gallery Image ' + $index}}" class="gallery-image" />
                    </div>
                </a>
            </div>
        </div>
    </div>
</div>        
                
        <!-- Gallery -->

        <!-- Footer Start -->
    <div id="footer-container"></div>
        <!-- Footer End -->

        <!-- Back to Top -->
        <a href="#" class="btn btn-lg btn-primary btn-lg-square back-to-top ytb"><i class="bi bi-arrow-up"></i></a>
    </div>

    <!-- JavaScript Libraries -->
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="lib/wow/wow.min.js"></script>
    <script src="lib/easing/easing.min.js"></script>
    <script src="lib/waypoints/waypoints.min.js"></script>
    <script src="lib/owlcarousel/owl.carousel.min.js"></script>

    <!-- Template Javascript -->
    <script src="js/main.js"></script>

    <script>
        $('.img-gal').magnificPopup({
            type: 'image',
            gallery: {
                enabled: true
            }
        });
    </script>
    <script src="js/loader.js"></script> 
    <script src="js/footer.js"></script>
</body>

</html>
